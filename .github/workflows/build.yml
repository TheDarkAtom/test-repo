name: Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build
        required: true
        default: main
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache deps
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            deps/install
            toolchain
          key: deps-${{ hashFiles('download-toolchain.ps1', 'download-deps.ps1', 'build-deps.ps1', 'i686-toolchain.cmake') }}

      - name: Download and extract toolchain
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./download-toolchain.ps1
      
      - name: Download and extract dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./download-deps.ps1

      - name: Build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./build-deps.ps1 -Toolchain "${{ github.workspace }}/i686-toolchain.cmake"

      - name: Clone and build
        run: ./build-titan.ps1 -Branch ${{ inputs.branch }} -Toolchain "${{ github.workspace }}/i686-toolchain.cmake"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TitanEditor-${{ inputs.branch }}
          path: build/TitanEditor.exe